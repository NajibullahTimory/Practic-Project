<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG MARKETPLACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg0:#060810;--crimsn:#c0152a;--crimsn2:#e01830;
            --ice:#4fc3f7;--text:#dde3f0;--text2:#8892b0;
        }
        html,body{height:100%;font-family:'Chakra Petch',sans-serif;background:var(--bg0);color:var(--text);overflow:hidden;}

        .grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(79,195,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,.04) 1px,transparent 1px);background-size:60px 60px;animation:gs 20s linear infinite;}
        @keyframes gs{0%{background-position:0 0}100%{background-position:0 60px}}
        .glow-a{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(192,21,42,.12) 0%,transparent 70%);top:-100px;left:-100px;z-index:0;animation:da 12s ease-in-out infinite alternate;}
        .glow-b{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(79,195,247,.08) 0%,transparent 70%);bottom:-80px;right:-80px;z-index:0;animation:db 15s ease-in-out infinite alternate;}
        @keyframes da{0%{transform:translate(0,0)}100%{transform:translate(60px,40px)}}
        @keyframes db{0%{transform:translate(0,0)}100%{transform:translate(-50px,-30px)}}
        .scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);}
        .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.8) 100%);}

        .wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;overflow-y:auto;}

        .brand{text-align:center;margin-bottom:2rem;animation:bi .9s cubic-bezier(.16,1,.3,1) both;}
        @keyframes bi{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        .brand-emblem{display:inline-flex;align-items:center;justify-content:center;width:70px;height:70px;border-radius:4px;background:linear-gradient(135deg,var(--crimsn),#7a0010);border:1px solid rgba(192,21,42,.5);font-size:2rem;margin-bottom:1rem;box-shadow:0 0 30px rgba(192,21,42,.4);animation:ep 3s ease-in-out infinite;}
        @keyframes ep{0%,100%{box-shadow:0 0 30px rgba(192,21,42,.4)}50%{box-shadow:0 0 50px rgba(192,21,42,.65)}}
        .brand h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:8px;color:var(--text);text-shadow:0 0 30px rgba(79,195,247,.25);line-height:1;}
        .brand-sub{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:4px;color:var(--text2);margin-top:.4rem;}
        .brand-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--crimsn),var(--ice),var(--crimsn),transparent);margin-top:.8rem;opacity:.6;}

        .login-card{width:100%;max-width:430px;background:rgba(11,14,26,.93);border:1px solid rgba(79,195,247,.12);border-radius:2px;box-shadow:0 0 0 1px rgba(79,195,247,.04),0 30px 80px rgba(0,0,0,.8);backdrop-filter:blur(20px);animation:ci .9s cubic-bezier(.16,1,.3,1) .1s both;position:relative;overflow:hidden;}
        @keyframes ci{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .login-card::before{content:'';position:absolute;top:0;left:0;width:12px;height:12px;border-top:2px solid var(--crimsn);border-left:2px solid var(--crimsn);}
        .login-card::after{content:'';position:absolute;bottom:0;right:0;width:12px;height:12px;border-bottom:2px solid var(--ice);border-right:2px solid var(--ice);}
        .card-top-bar{height:3px;background:linear-gradient(90deg,var(--crimsn),#500010,var(--ice),#002040,var(--crimsn));background-size:300%;animation:bf 4s linear infinite;}
        @keyframes bf{0%{background-position:0%}100%{background-position:300%}}

        .tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.06);}
        .tab-btn{padding:.9rem;background:none;border:none;color:var(--text2);font-family:'Chakra Petch',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;position:relative;}
        .tab-btn::after{content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;background:var(--crimsn);transition:all .3s;}
        .tab-btn.active{color:var(--text);}
        .tab-btn.active::after{left:0;right:0;}

        .panel{display:none;padding:2rem 2rem 1.8rem;}
        .panel.active{display:block;}

        .field{margin-bottom:1.1rem;}
        .field label{display:flex;align-items:center;gap:.5rem;font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;margin-bottom:.4rem;}
        .field label span{color:var(--crimsn);}
        .field-wrap{position:relative;}
        .field-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:.9rem;opacity:.35;pointer-events:none;}
        .field input{width:100%;padding:.8rem 2.8rem .8rem 2.5rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:2px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.9rem;letter-spacing:.5px;transition:all .3s;}
        .field input::placeholder{color:rgba(221,227,240,.2);font-family:'Chakra Petch',sans-serif;font-size:.85rem;letter-spacing:0;}
        .field input:focus{outline:none;border-color:rgba(79,195,247,.4);background:rgba(79,195,247,.04);box-shadow:0 0 0 3px rgba(79,195,247,.06);}

        /* EYE TOGGLE */
        .eye-btn{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);font-size:1rem;padding:.25rem;transition:color .2s;line-height:1;z-index:2;}
        .eye-btn:hover{color:var(--ice);}

        .msg{display:none;border-radius:2px;padding:.7rem 1rem;font-family:'Share Tech Mono',monospace;font-size:.78rem;letter-spacing:.5px;margin-bottom:1rem;}
        .msg.error{background:rgba(192,21,42,.1);border:1px solid rgba(192,21,42,.3);color:#ff6b7a;animation:shake .4s ease;}
        .msg.success{background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.25);color:var(--ice);}
        .msg.show{display:block;}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

        .btn-enter{width:100%;padding:1rem;margin-top:.4rem;background:linear-gradient(135deg,var(--crimsn),#8a0018);border:1px solid rgba(192,21,42,.5);border-radius:2px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:6px;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(192,21,42,.3);}
        .btn-enter:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(192,21,42,.5);}
        .btn-enter:active{transform:translateY(0);}

        .hint{text-align:center;margin-top:1.2rem;font-size:.75rem;color:var(--text2);}
        .hint a{color:rgba(79,195,247,.7);cursor:pointer;text-decoration:none;transition:color .2s;}
        .hint a:hover{color:var(--ice);}

        .foot{text-align:center;margin-top:1.5rem;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(221,227,240,.15);letter-spacing:2px;}
        @media(max-width:480px){.brand h1{font-size:2rem;}.panel{padding:1.5rem 1.2rem;}}
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-a"></div><div class="glow-b"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="wrap">
    <div class="brand">
        <div class="brand-emblem">⚔️</div>
        <h1>PUBG MARKETPLACE</h1>
        <div class="brand-sub">Secure Trading Platform · Est. 2024</div>
        <div class="brand-line"></div>
    </div>

    <div class="login-card">
        <div class="card-top-bar"></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">SIGN IN</button>
            <button class="tab-btn" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- SIGN IN -->
        <div class="panel active" id="panel-login">
            <div class="field">
                <label><span>//</span> Name</label>
                <div class="field-wrap">
                    <span class="field-icon">◈</span>
                    <input type="text" id="ln-name" placeholder="Your name" autocomplete="off">
                </div>
            </div>
            <div class="field">
                <label><span>//</span> Gmail or Mobile</label>
                <div class="field-wrap">
                    <span class="field-icon">◉</span>
                    <input type="text" id="ln-contact" placeholder="Gmail or mobile number" autocomplete="off">
                </div>
            </div>
            <div class="field">
                <label><span>//</span> Password</label>
                <div class="field-wrap">
                    <span class="field-icon">▣</span>
                    <input type="password" id="ln-pass" placeholder="Enter password" autocomplete="off">
                    <button type="button" class="eye-btn" onclick="togglePass('ln-pass',this)" tabindex="-1">👁</button>
                </div>
            </div>
            <div class="msg error" id="ln-err"></div>
            <button class="btn-enter" onclick="doLogin()">▶ ENTER</button>
            <p class="hint">No account? <a onclick="switchTab('register')">Register here</a></p>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
            <div class="field">
                <label><span>//</span> Your Name</label>
                <div class="field-wrap">
                    <span class="field-icon">◈</span>
                    <input type="text" id="rg-name" placeholder="Enter your name" autocomplete="off">
                </div>
            </div>
            <div class="field">
                <label><span>//</span> Gmail or Mobile</label>
                <div class="field-wrap">
                    <span class="field-icon">◉</span>
                    <input type="text" id="rg-contact" placeholder="Gmail or mobile number" autocomplete="off">
                </div>
            </div>
            <div class="field">
                <label><span>//</span> Password</label>
                <div class="field-wrap">
                    <span class="field-icon">▣</span>
                    <input type="password" id="rg-pass" placeholder="Create a password" autocomplete="off">
                    <button type="button" class="eye-btn" onclick="togglePass('rg-pass',this)" tabindex="-1">👁</button>
                </div>
            </div>
            <div class="msg error"   id="rg-err"></div>
            <div class="msg success" id="rg-ok">✓ Account created — you can now sign in.</div>
            <button class="btn-enter" onclick="doRegister()">▶ CREATE ACCOUNT</button>
            <p class="hint">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
        </div>
    </div>

    <p class="foot">// PUBG MARKETPLACE · ALL RIGHTS RESERVED //</p>
</div>

<script>
const ADMIN_PASS = '@admin123';

function switchTab(t) {
    ['login','register'].forEach(id => {
        document.getElementById('panel-'+id).classList.toggle('active', id===t);
    });
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', (t==='login'&&i===0)||(t==='register'&&i===1));
    });
    clearMsgs();
}

function clearMsgs() {
    ['ln-err','rg-err','rg-ok'].forEach(id => {
        var e = document.getElementById(id);
        if (e) e.classList.remove('show');
    });
}

function togglePass(id, btn) {
    var inp = document.getElementById(id);
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁';
    }
}

function doLogin() {
    var name    = document.getElementById('ln-name').value.trim();
    var contact = document.getElementById('ln-contact').value.trim();
    var pass    = document.getElementById('ln-pass').value;
    var err     = document.getElementById('ln-err');
    clearMsgs();

    if (!name) { err.textContent='⚠ Name is required.'; err.classList.add('show'); return; }

    if (pass === ADMIN_PASS) {
        sessionStorage.setItem('pubg_role', 'admin');
        sessionStorage.setItem('pubg_name', name);
        window.location.href = 'index.html';
        return;
    }

    if (!contact) { err.textContent='⚠ Gmail or mobile is required.'; err.classList.add('show'); return; }

    var users = JSON.parse(localStorage.getItem('pubg_users') || '[]');
    var user  = users.find(function(u){ return u.contact===contact && u.pass===pass; });
    if (!user) { err.textContent='⚠ Account not found or wrong password.'; err.classList.add('show'); return; }

    sessionStorage.setItem('pubg_role', 'user');
    sessionStorage.setItem('pubg_name', user.name);
    window.location.href = 'index.html';
}

function doRegister() {
    var name    = document.getElementById('rg-name').value.trim();
    var contact = document.getElementById('rg-contact').value.trim();
    var pass    = document.getElementById('rg-pass').value;
    var err     = document.getElementById('rg-err');
    var ok      = document.getElementById('rg-ok');
    clearMsgs();

    if (!name || !contact || !pass) { err.textContent='⚠ All fields are required.'; err.classList.add('show'); return; }
    if (pass.length < 4) { err.textContent='⚠ Password must be at least 4 characters.'; err.classList.add('show'); return; }

    var users = JSON.parse(localStorage.getItem('pubg_users') || '[]');
    if (users.find(function(u){ return u.contact===contact; })) {
        err.textContent='⚠ This Gmail/number is already registered.'; err.classList.add('show'); return;
    }

    users.push({ name: name, contact: contact, pass: pass });
    localStorage.setItem('pubg_users', JSON.stringify(users));
    ok.classList.add('show');
    document.getElementById('ln-name').value    = name;
    document.getElementById('ln-contact').value = contact;
    setTimeout(function(){ switchTab('login'); }, 1600);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        var active = document.querySelector('.panel.active');
        if (active.id === 'panel-login') doLogin(); else doRegister();
    }
});
</script>
</body>
</html>
